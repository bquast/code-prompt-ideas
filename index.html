<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBench • JS Prompt Arena</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=General+Sans:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --text: #0A0A0A;
            --text-secondary: #6B6B6B;
            --border: #E8E8EC;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', system-ui, sans-serif;
            min-height: 100vh;
        }
        
        header {
            padding: 1rem 2rem;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
        }
        
        .logo {
            font-family: 'General Sans', sans-serif;
            font-weight: 600;
            letter-spacing: -0.03em;
            font-size: 1.35rem;
        }
        
        .top-right {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        .main {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .prompt-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .prompt-label {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        
        #prompt-text {
            font-size: 1.55rem;
            line-height: 1.35;
            font-weight: 600;
            margin: 0;
            font-family: 'General Sans', sans-serif;
            letter-spacing: -0.02em;
        }
        
        .code-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        .option {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .option-header {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        .done {
            color: #10B981;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            padding: 1.25rem;
            background: #F8F8F8;
            margin: 0;
            overflow-x: auto;
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        
        .output {
            padding: 1.25rem;
            background: #F8F8F8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #166534;
            min-height: 140px;
            overflow-y: auto;
        }
        
        .vote-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .vote-col {
            text-align: center;
        }
        
        .vote-btn {
            width: 100%;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .vote-a {
            background: var(--primary);
            color: white;
        }
        
        .vote-b {
            background: var(--primary);
            color: white;
        }
        
        .vote-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }
        
        .skip-btn {
            padding: 1rem 2rem;
            background: white;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .footer {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">CodeBench</div>
        <div class="top-right">JS Arena</div>
    </header>

    <div class="main">
        <div class="prompt-card">
            <div class="prompt-label">PROMPT</div>
            <h1 id="prompt-text">Loading next prompt...</h1>
        </div>

        <div class="code-container" id="code-container"></div>

        <div class="vote-row">
            <div class="vote-col">
                <button onclick="vote(1)" class="vote-btn vote-a" id="vote1">Vote A</button>
            </div>
            <div class="vote-col">
                <button onclick="vote(2)" class="vote-btn vote-b" id="vote2">Vote B</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 1.5rem;">
            <button onclick="skip()" class="skip-btn">Skip</button>
        </div>
    </div>

    <div class="footer">
        Built on Cloudflare Pages • Open human preference dataset for code generation
    </div>

    <script src="app.js"></script>
</body>
</html>
