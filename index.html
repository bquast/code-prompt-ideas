<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBench • JS Prompt Arena</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --fg: #f0f0f0;
            --accent: #00ff9d;
            --card: #1a1a1a;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
        }
        
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -2px;
        }
        
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .prompt {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #333;
        }
        
        .prompt-label {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .code-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        
        .option {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 3px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        
        .option:hover {
            border-color: #444;
        }
        
        .option.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 255, 157, 0.2);
        }
        
        .option-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--card);
            padding: 0 12px;
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 500;
        }
        
        pre {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.95rem;
            background: #111;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 320px;
            margin: 0 0 1rem 0;
            white-space: pre;
            tab-size: 2;
        }
        
        .output {
            background: #0f0f0f;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 8px;
            min-height: 130px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            color: #0f0;
            overflow-y: auto;
        }
        
        .model-name {
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0;
            text-align: center;
            transition: opacity 0.4s;
        }
        
        .revealed .model-name {
            opacity: 0.7;
        }
        
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
        }
        
        button {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .vote-btn {
            background: var(--accent);
            color: #000;
            flex: 1;
            max-width: 300px;
        }
        
        .vote-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 157, 0.3);
        }
        
        .skip-btn {
            background: transparent;
            color: var(--fg);
            border: 2px solid #444;
        }
        
        .footer {
            text-align: center;
            padding: 3rem 1rem;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">CodeBench</div>
        <div>
            <a href="/leaderboard" class="leaderboard-link" style="color: var(--accent); text-decoration: none;">Leaderboard →</a>
        </div>
    </header>

    <div class="main">
        <div class="prompt">
            <div class="prompt-label">PROMPT</div>
            <h2 id="prompt-text">Loading next prompt...</h2>
        </div>

        <div class="code-container" id="code-container">
            <!-- Populated by JS -->
        </div>

        <div class="actions">
            <button onclick="vote(1)" class="vote-btn" id="vote1">Vote A (Better)</button>
            <button onclick="vote(2)" class="vote-btn" id="vote2">Vote B (Better)</button>
            <button onclick="skip()" class="skip-btn">Skip</button>
        </div>
    </div>

    <div class="footer">
        Built on Cloudflare Pages • Data stored in D1 • Vanilla JS only<br>
        Your votes help build a public dataset of human preferences for code generation.
    </div>

    <script src="app.js"></script>
</body>
</html>
